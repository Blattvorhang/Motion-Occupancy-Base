name: mob

channels:
  - pytorch
  - nvidia
  - pytorch3d
  - conda-forge

dependencies:
  - python=3.11
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=12.1
  - pytorch3d::pytorch3d
  - omegaconf
  - numpy
  - matplotlib
  - scipy
  - trimesh
  - joblib
  - chumpy
